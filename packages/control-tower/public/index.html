<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Caliper — precision for your AI spend</title>
  <link rel="icon" href="/icon-light-32x32.png" media="(prefers-color-scheme: light)">
  <link rel="icon" href="/icon-dark-32x32.png" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="/app.css">
</head>
<body>

<header class="app">
  <div class="app-inner">
    <a class="brand" href="#/">caliper.run</a>
    <span class="crumbs" id="crumbs"></span>
    <span class="spacer"></span>
    <button class="btn-ghost" id="btn-theme" type="button" title="Toggle light / dark">☾</button>
    <button class="btn-ghost" id="btn-tour" type="button" title="A guided walkthrough of every panel">✦ Tour</button>
    <span class="live-chip" id="hdr-live" hidden></span>
  </div>
</header>

<main id="view">
  <div class="boot"><div class="b-inner">
    <div class="b-title">Reading your run logs…</div>
    <div class="b-bar"><i></i></div>
  </div></div>
</main>

<footer class="app">
  <div class="foot-inner">
    <p class="caveat">Every number is a <b>cache-aware metered estimate</b> reconstructed from your own Claude Code run logs (<span class="mono">~/.claude/projects/**</span>) using Caliper's price table — not a provider invoice. Costs cover the transcripts currently on this machine.</p>
    <p class="prov" id="prov"></p>
  </div>
</footer>

<div id="modal-mount"></div>
<div id="tip" role="tooltip"></div>

<script src="/app.js" type="module"></script>
</body>
</html>
